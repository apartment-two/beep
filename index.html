<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>beep-beep</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a2e;
        overflow: hidden;
        font-family: monospace;
      }
      canvas {
        display: block;
      }

      /* ── Plate input overlay ────────────────────────────────────────── */
      #plate-screen {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      #plate-box {
        background: #1a1a2e;
        border: 3px solid #555;
        border-radius: 12px;
        padding: 36px 44px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      }
      #plate-box h2 {
        color: #fff;
        font-size: 15px;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0.8;
      }
      #plate-input {
        background: #f5e642;
        border: 3px solid #222;
        border-radius: 6px;
        font: bold 42px/1 monospace;
        width: 160px;
        text-align: center;
        letter-spacing: 10px;
        text-transform: uppercase;
        padding: 10px 8px;
        outline: none;
        color: #111;
      }
      #plate-input::placeholder {
        color: #aaa8;
        letter-spacing: 8px;
      }
      #plate-btn {
        background: #f5e642;
        border: 3px solid #222;
        border-radius: 6px;
        font: bold 16px monospace;
        letter-spacing: 3px;
        padding: 10px 36px;
        cursor: pointer;
        transition: background 0.15s;
      }
      #plate-btn:hover {
        background: #ffe000;
      }
      #plate-hint {
        color: #888;
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* ── HUD ────────────────────────────────────────────────────────── */
      #hud {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 13px;
        text-align: center;
        opacity: 0.7;
        pointer-events: none;
        text-shadow: 0 1px 3px #000;
      }
      #speedometer {
        position: fixed;
        top: 20px;
        right: 24px;
        color: #fff;
        font-size: 18px;
        text-align: right;
        pointer-events: none;
        text-shadow: 0 1px 4px #000;
      }

      /* ── Connected players list ─────────────────────────────────────── */
      #players {
        position: fixed;
        top: 20px;
        left: 20px;
        color: #fff;
        font-size: 13px;
        line-height: 1.9;
        pointer-events: none;
        text-shadow: 0 1px 3px #000;
        min-width: 80px;
      }
      #players .me {
        opacity: 1;
      }
      #players .other {
        opacity: 0.75;
      }
    </style>
    <script
      type="module"
      crossorigin
      src="/beep/assets/index-idp21Aa8.js"
    ></script>
  </head>
  <body>
    <!-- Plate entry screen -->
    <div id="plate-screen">
      <div id="plate-box">
        <h2>Your License Plate</h2>
        <input
          id="plate-input"
          type="text"
          maxlength="3"
          placeholder="ABC"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <button id="plate-btn">JOIN</button>
        <span id="plate-hint">1 – 3 alphanumeric characters</span>
      </div>
    </div>

    <div id="hud">
      W/A/S/D or Arrow Keys — Drive · SPACE — Brake · R — Reset
    </div>
    <div id="speedometer">0 mph</div>
    <div id="players"></div>
  </body>
</html>
